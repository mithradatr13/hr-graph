services:
  postgres:
    image: docker.arvancloud.ir/postgres:15-alpine
    container_name: task_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: taskdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d taskdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis service has been removed due to port conflict (address already in use)

  app:
    build: .
    container_name: task_api
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=admin
      - DB_PASSWORD=secret
      - DB_NAME=taskdb
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: