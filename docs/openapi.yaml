openapi: 3.0.0
info:
  title: Task Manager API
  description: A production-ready Task Manager API built with Go, Clean Architecture, and Gin.
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1
    description: Local development server

paths:
  /tasks:
    post:
      summary: Create a new task
      description: Creates a new task with a given title, status, and optional assignee.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskInput'
      responses:
        '201':
          description: Task successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Invalid request payload or validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      summary: List tasks
      description: Retrieves a paginated list of tasks with optional filtering by status and search query.
      parameters:
        - name: status
          in: query
          required: false
          description: Filter tasks by status (e.g., pending, completed)
          schema:
            type: string
        - name: search
          in: query
          required: false
          description: Search term matching task titles
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Number of items to return per page
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          required: false
          description: Number of items to skip for pagination
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: A list of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tasks/{id}:
    get:
      summary: Get a task by ID
      description: Retrieves a single task by its unique identifier.
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier of the task
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Task found successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Invalid task ID format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      summary: Update an existing task
      description: Updates the details of an existing task by its ID.
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier of the task
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskInput'
      responses:
        '200':
          description: Task successfully updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Invalid request payload or task ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: Delete a task
      description: Removes a task by its unique identifier.
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier of the task
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Task successfully deleted (no content)
        '400':
          description: Invalid task ID format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    Task:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        title:
          type: string
          example: "Implement database layer"
        status:
          type: string
          example: "pending"
        assignee:
          type: string
          example: "Mehrdad"
        created_at:
          type: string
          format: date-time
          example: "2026-07-21T01:19:15Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-07-21T01:19:15Z"

    TaskInput:
      type: object
      required:
        - title
        - status
      properties:
        title:
          type: string
          example: "Implement database layer"
        status:
          type: string
          example: "pending"
        assignee:
          type: string
          example: "Mehrdad"

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: "Internal Server Error"